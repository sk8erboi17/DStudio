<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>DStudio</title>
  <script>
    (() => {
      try {
        const settings = JSON.parse(localStorage.getItem('ds4web.settings.v1') || '{}');
        if (settings && settings.lanClientHost) location.replace('/');
        if (!settings || settings.onboardedVersion !== 8) location.replace('/');
      } catch {
        location.replace('/');
      }
    })();
  </script>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #f7f7f4;
      --accent: #7aa7ff;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #070707;
      }
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: var(--bg);
    }
    main {
      display: grid;
      place-items: center;
    }
    .mark {
      width: 78px;
      height: 78px;
      border-radius: 50%;
      position: relative;
      background:
        radial-gradient(circle at center, var(--accent) 0 8px, transparent 9px),
        conic-gradient(from 0deg, transparent 0 16deg, var(--accent) 16deg 58deg, transparent 58deg 106deg, var(--accent) 106deg 148deg, transparent 148deg 196deg, var(--accent) 196deg 238deg, transparent 238deg 286deg, var(--accent) 286deg 328deg, transparent 328deg);
      box-shadow: inset 0 0 0 16px color-mix(in srgb, var(--bg), transparent 18%);
      animation: spin 1.4s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <main aria-label="DStudio is starting">
    <span class="mark" aria-hidden="true"></span>
  </main>
  <script>
    const step = () => {};
    const sleep = (ms) => new Promise((resolve) => setTimeout(resolve, ms));
    const err = { textContent: '' };
    const actions = { style: { display: 'none' } };

    async function fetchJson(url, opts = {}, timeout = 4000) {
      const ctl = new AbortController();
      const timer = setTimeout(() => ctl.abort(), timeout);
      try {
        const res = await fetch(url, { ...opts, signal: ctl.signal });
        if (!res.ok) throw new Error('HTTP ' + res.status);
        return await res.json();
      } finally {
        clearTimeout(timer);
      }
    }

    async function waitForReady() {
      let failures = 0;
      for (;;) {
        try {
          const st = await fetchJson('/api/status', {}, 3500);
          step('s-launcher', 'done');
          step('s-ready', 'on');
          if (st.ready === true && st.running === true) {
            step('s-ready', 'done');
            return;
          }
          err.textContent = st.stage ? st.stage : 'Model is still starting...';
        } catch (e) {
          failures++;
          err.textContent = 'Waiting for the local launcher...';
          if (failures > 8) actions.style.display = 'block';
        }
        await sleep(900);
      }
    }

    async function askAlive() {
      step('s-alive', 'on');
      const body = {
        model: 'ds4',
        stream: false,
        temperature: 0,
        max_tokens: 16,
        messages: [{ role: 'user', content: 'hello are you alive?' }]
      };
      for (;;) {
        try {
          const json = await fetchJson('/v1/chat/completions', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body)
          }, 45000);
          if (json && Array.isArray(json.choices) && json.choices.length > 0) {
            step('s-alive', 'done');
            location.replace('/');
            return;
          }
          throw new Error('empty model response');
        } catch (e) {
          err.textContent = 'Model probe failed, retrying...';
          actions.style.display = 'block';
          await sleep(1400);
        }
      }
    }

    (async () => {
      await waitForReady();
      await askAlive();
    })();
  </script>
</body>
</html>
